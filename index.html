<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PricePulse | Find. Share. Save.</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="PricePulse - Find, share, and save on the best deals near you. Social deal sharing platform.">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (loaded before app) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body>
    <!-- NIKE-STYLE HEADER -->
    <header class="nike-header">
        <div class="header-top">
            <div>
                <div class="header-logo">PricePulse</div>
                <div class="header-tagline">Find. Share. Save.</div>
            </div>
            <div class="header-actions" id="header-actions">
                <div class="icon-btn" data-action="search" title="Search">
                    <i data-lucide="search" width="20" height="20"></i>
                </div>
                <div class="icon-btn" data-action="activity" title="Activity" style="position:relative;">
                    <i data-lucide="bell" width="20" height="20"></i>
                    <span class="notif-dot" id="notif-dot"></span>
                </div>
                <div class="icon-btn" data-action="profile" title="Profile">
                    <i data-lucide="user" width="20" height="20"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- FEED CONTAINER -->
    <div class="feed-container" id="feed-container">
        <!-- Feed will be rendered here by JavaScript -->
    </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav" id="bottom-nav">
        <div class="nav-item active" data-action="home" id="btn-home">
            <i data-lucide="home" width="24" height="24"></i>
            <span class="nav-label">Home</span>
        </div>
        <div class="nav-item" data-action="explore" id="btn-explore">
            <i data-lucide="compass" width="24" height="24"></i>
            <span class="nav-label">Explore</span>
        </div>
        <div class="nav-item create" data-action="upload" id="btn-upload">
            <i data-lucide="plus-circle" width="28" height="28"></i>
        </div>
        <div class="nav-item" data-action="activity" id="btn-activity">
            <i data-lucide="bell" width="24" height="24"></i>
            <span class="nav-label">Activity</span>
        </div>
        <div class="nav-item" data-action="profile" id="btn-profile">
            <i data-lucide="user" width="24" height="24"></i>
            <span class="nav-label">Profile</span>
        </div>
    </nav>

    <!-- Modal Container -->
    <div id="modal-container" style="display: none;"></div>

    <!-- App Entry Point (defer to ensure Firebase loads first) -->
    <script type="module" src="app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
        
        // Debug helper - check if buttons work
        window.addEventListener('load', () => {
            setTimeout(() => {
                console.log('🔍 Checking button functionality...');
                const buttons = document.querySelectorAll('[data-action]');
                console.log(`Found ${buttons.length} buttons with data-action`);
                
                buttons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        console.log('✅ Button clicked:', btn.dataset.action);
                    });
                });
                
                // Check if Lucide rendered
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                    console.log('✅ Lucide icons rendered');
                }
            }, 1000);
        });
    </script>
</body>
</html>
