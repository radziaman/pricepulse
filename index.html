<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PricePulse</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <!-- Instagram-Style Header -->
    <header class="insta-header">
        <span class="header-logo">PricePulse</span>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div class="nav-item inactive" onclick="window.openModal('search-modal')">
                <i data-lucide="search" size="24"></i>
            </div>
            <div class="nav-item inactive" onclick="window.openNotifications()">
                <i data-lucide="heart" size="24"></i>
            </div>
            <div class="nav-item inactive" onclick="window.openProfile()">
                <i data-lucide="user" size="24"></i>
            </div>
        </div>
    </header>

    <!-- Main Feed -->
    <main class="main-feed" id="feed-container"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('deals')">
            <i data-lucide="home" size="24"></i>
        </div>
        <div class="nav-item inactive" onclick="window.openModal('explore-modal')">
            <i data-lucide="compass" size="24"></i>
        </div>
        <div class="nav-item post-btn" onclick="window.openUpload()">
            <i data-lucide="plus" size="24" style="color: #000;"></i>
        </div>
        <div class="nav-item inactive" onclick="window.openModal('activity-modal')">
            <i data-lucide="bell" size="24"></i>
        </div>
        <div class="nav-item inactive" onclick="window.openProfile()">
            <i data-lucide="user" size="24"></i>
        </div>
    </nav>

    <!-- Search Modal -->
    <div id="search-modal" class="modal-overlay" style="display: none; align-items: center; justify-content: flex-start; padding-top: 100px;">
        <div class="modal-sheet" style="max-width: 400px; border-radius: 24px;">
            <div class="search-bar-container" style="margin-bottom: 20px;">
                <i data-lucide="search" size="18" style="color: var(--text-gray);"></i>
                <input type="text" class="search-bar" placeholder="Search deals..." oninput="searchDeals(this.value)" style="margin: 0; background: transparent;">
            </div>
            <div id="search-results" style="text-align: left; max-height: 300px; overflow-y: auto;"></div>
            <button class="btn-primary" style="margin-top: 16px; background: transparent; color: var(--text-white); border: 1px solid var(--border-color);" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2 class="modal-title">New Deal</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <form id="upload-form">
                <input type="text" id="inp-name" placeholder="What did you find?" required style="width: 100%; margin-bottom: 12px;">
                <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                    <input type="text" id="inp-price" placeholder="Price ($)" required style="flex: 1; margin: 0;">
                    <input type="text" id="inp-loc" placeholder="Location" required style="flex: 1; margin: 0;">
                </div>
                <button type="submit" class="btn-primary">Share Deal</button>
            </form>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2 class="modal-title">Profile</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <div id="profile-content" style="text-align: center;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent-lime); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 32px; font-weight: 700; color: #000;">
                    <span id="profile-initial">P</span>
                </div>
                <h2 id="profile-name" style="margin-bottom: 4px;">Pulse Hunter</h2>
                <p id="profile-level" style="color: var(--accent-lime); font-weight: 600; margin-bottom: 20px;">Level 1 • 0 XP</p>
                
                <div style="display: flex; justify-content: center; gap: 32px; margin-bottom: 24px;">
                    <div><div id="profile-deals" style="font-weight: 700; font-size: 18px;">0</div><div style="font-size: 12px; color: var(--text-gray);">Deals</div></div>
                    <div><div id="profile-followers" style="font-weight: 700; font-size: 18px;">0</div><div style="font-size: 12px; color: var(--text-gray);">Followers</div></div>
                    <div><div id="profile-following" style="font-weight: 700; font-size: 18px;">0</div><div style="font-size: 12px; color: var(--text-gray);">Following</div></div>
                </div>
                
                <button class="btn-primary" style="background: var(--bg-secondary); border: 1px solid var(--border-color);" onclick="window.openAuth()">Edit Profile</button>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2 class="modal-title">Welcome</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <p style="color: var(--text-gray); margin-bottom: 24px;">Sign in to share deals and earn XP!</p>
            
            <button class="btn-primary" style="margin-bottom: 12px;" onclick="window.loginWithGoogle()">
                <i data-lucide="chrome" size="18" style="margin-right: 8px;"></i> Continue with Google
            </button>
            <button class="btn-primary" style="background: #000; border: 1px solid var(--border-color); margin-bottom: 12px;" onclick="window.loginWithApple()">
                <i data-lucide="apple" size="18" style="margin-right: 8px;"></i> Continue with Apple
            </button>
            
            <div style="display: flex; align-items: center; gap: 16px; margin: 24px 0;">
                <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
                <span style="font-size: 12px; color: var(--text-gray);">OR</span>
                <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            </div>
            
            <form onsubmit="event.preventDefault(); window.loginWithEmail();">
                <input type="email" id="auth-email" placeholder="Email" required style="margin-bottom: 12px;">
                <input type="password" id="auth-password" placeholder="Password" required style="margin-bottom: 12px;">
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Activity/Notifications Modal -->
    <div id="activity-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet" style="max-height: 80vh;">
            <div class="modal-header">
                <h2 class="modal-title">Activity</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <div id="activity-list" style="text-align: left; max-height: 60vh; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- Comments Modal -->
    <div id="comments-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2 class="modal-title">Comments</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <div id="comments-list" style="text-align: left; max-height: 300px; overflow-y: auto; margin-bottom: 16px;"></div>
            <div style="display: flex; gap: 12px;">
                <input type="text" id="comment-input" placeholder="Add a comment..." style="margin: 0; flex: 1;">
                <button onclick="window.postComment()" style="background: none; border: none; color: var(--accent-lime); font-weight: 700; cursor: pointer;">Post</button>
            </div>
        </div>
    </div>

    <!-- Analysis Modal -->
    <div id="analysis-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2 class="modal-title">Deal Analysis</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <div id="analysis-content" style="text-align: left;">
                <p style="color: var(--text-gray); margin-bottom: 12px;">Loading AI analysis...</p>
            </div>
        </div>
    </div>

    <!-- AI Recommendations Modal -->
    <div id="ai-recs-modal" class="modal-overlay" style="display: none; align-items: flex-end;">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2 class="modal-title">AI Picks</h2>
                <div onclick="closeModals()" style="cursor: pointer;">
                    <i data-lucide="x" size="24"></i>
                </div>
            </div>
            <div id="ai-recs-content" style="text-align: left;">
                <p style="color: var(--text-gray);">Finding best deals for you...</p>
            </div>
        </div>
    </div>

    <script src="gemini-service.js"></script>
    <script src="ai-service.js"></script>
    <script src="app.js"></script>
</body>
</html>
