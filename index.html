<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PricePulse | Find. Share. Save.</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="PricePulse - Find, share, and save on the best deals near you. Social deal sharing platform.">
    <meta property="og:title" content="PricePulse | Find. Share. Save.">
    <meta property="og:description" content="Join the community hunting the best deals in Singapore!">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
</head>
<body>
    <!-- NIKE-STYLE HEADER -->
    <header class="nike-header">
        <div class="header-top">
            <div>
                <div class="header-logo">PricePulse</div>
                <div class="header-tagline">Find. Share. Save.</div>
            </div>
    <div class="header-actions" id="header-actions">
        <div class="icon-btn" data-action="search" title="Search">
            <i data-lucide="search" width="20" height="20"></i>
        </div>
        <div class="icon-btn" data-action="activity" title="Activity" style="position:relative;">
            <i data-lucide="bell" width="20" height="20"></i>
            <span class="notif-dot" id="notif-dot"></span>
        </div>
        <div class="icon-btn" data-action="profile" title="Profile">
            <i data-lucide="user" width="20" height="20"></i>
        </div>
    </div>
        </div>
    </header>

     <!-- FEED CONTAINER -->
     <div class="feed-container" id="feed-container">
         <!-- Feed will be rendered here by JavaScript -->
     </div>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav" id="bottom-nav">
        <div class="nav-item active" data-action="home">
            <i data-lucide="home" width="24" height="24"></i>
            <span class="nav-label">Home</span>
        </div>
        <div class="nav-item" data-action="explore">
            <i data-lucide="compass" width="24" height="24"></i>
            <span class="nav-label">Explore</span>
        </div>
        <div class="nav-item create" data-action="upload">
            <i data-lucide="plus-circle" width="28" height="28"></i>
        </div>
        <div class="nav-item" data-action="activity">
            <i data-lucide="bell" width="24" height="24"></i>
            <span class="nav-label">Activity</span>
        </div>
        <div class="nav-item" data-action="profile">
            <i data-lucide="user" width="24" height="24"></i>
            <span class="nav-label">Profile</span>
        </div>
    </nav>

    <!-- Modal Container - Modals will be injected here dynamically -->
    <div id="modal-container"></div>

    <!-- DASHBOARD SECTION (Instagram/LinkedIn Style) -->
    <div id="dashboard-section" style="display: none;">
        <div class="dashboard-header">
            <div class="header-top">
                <div class="header-logo">Dashboard</div>
                <div class="header-actions">
                    <div class="icon-btn" data-action="close-dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <div id="dashboard-container"></div>
    </div>

    <!-- Component Scripts -->
    <script type="module" src="js/components/upload-modal.js"></script>
    <script type="module" src="js/components/profile-modal.js"></script>
    <script type="module" src="js/components/comments-modal.js"></script>
    <script type="module" src="js/components/auth-modal.js"></script>
    <script type="module" src="js/components/edit-profile-modal.js"></script>
    <script type="module" src="js/components/search-modal.js"></script>
    <script type="module" src="js/components/activity-modal.js"></script>
    <script type="module" src="js/components/explore-modal.js"></script>
    <script type="module" src="js/components/share-modal.js"></script>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="firebase-service.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="monitoring.js"></script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
